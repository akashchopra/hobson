        const hint = document.createElement("span");
        hint.className = "repl-hint";
        hint.textContent = "Ctrl+Enter to run Up/Down for history";
        actions.appendChild(hint);

        inputPanel.appendChild(actions);
        container.appendChild(inputPanel);

        // Splitter
        const splitter = document.createElement("div");
        splitter.className = "repl-splitter";
        container.appendChild(splitter);

        // Transcript panel (bottom half)
        const transcriptPanel = document.createElement("div");
        transcriptPanel.className = "repl-transcript-panel";

        const transcript = document.createElement("div");
        transcript.id = "repl-transcript";

        const transcriptHeader = document.createElement("div");
        transcriptHeader.className = "repl-transcript-header";

        const transcriptHeading = document.createElement("h4");
        transcriptHeading.textContent = "Transcript";
        transcriptHeader.appendChild(transcriptHeading);

        const clearTranscriptBtn = document.createElement("button");
        clearTranscriptBtn.textContent = "Clear Transcript";
        clearTranscriptBtn.onclick = () => {
          document.getElementById("repl-transcript-entries").innerHTML = "";
          localStorage.setItem("repl-transcript", JSON.stringify([]));
        };
        transcriptHeader.appendChild(clearTranscriptBtn);

        transcript.appendChild(transcriptHeader);

        const transcriptEntries = document.createElement("div");
        transcriptEntries.id = "repl-transcript-entries";
        transcript.appendChild(transcriptEntries);

        transcriptPanel.appendChild(transcript);
        container.appendChild(transcriptPanel);

        // Add splitter drag functionality
        let isDragging = false;
        let startY = 0;
        let startInputHeight = 0;

        splitter.addEventListener("mousedown", (e) => {
          isDragging = true;
          startY = e.clientY;
          startInputHeight = inputPanel.offsetHeight;
          document.body.style.cursor = "row-resize";
          document.body.style.userSelect = "none";
          e.preventDefault();
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;

          const delta = e.clientY - startY;
          const newInputHeight = startInputHeight + delta;
          const containerHeight = container.offsetHeight;
          const headerHeight = header.offsetHeight;
          const splitterHeight = 6;

          // Calculate min and max heights (leaving space for transcript)
          const minHeight = 100;
          const maxHeight = containerHeight - headerHeight - splitterHeight - 100;

          if (newInputHeight >= minHeight && newInputHeight <= maxHeight) {
            inputPanel.style.flex = "none";
            inputPanel.style.height = newInputHeight + "px";
            transcriptPanel.style.flex = "1";
          }
        });

        document.addEventListener("mouseup", () => {
          if (isDragging) {
            isDragging = false;
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
          }
        });

        // Load and display saved transcript
        this.loadREPLTranscript();
        
        // Initialize history
        this.replHistory = JSON.parse(localStorage.getItem("repl-history") || "[]");
        this.replHistoryIndex = this.replHistory.length;
        
        // Keyboard shortcuts
        input.addEventListener("keydown", (e) => {
          // Ctrl+Enter to run
          if (e.ctrlKey && e.key === "Enter") {
            e.preventDefault();
            this.runREPL();
          }
          
          // Tab for indentation
          if (e.key === "Tab") {
            e.preventDefault();
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.value = input.value.substring(0, start) + "  " + input.value.substring(end);
            input.selectionStart = input.selectionEnd = start + 2;
          }
          
          // Up/Down for history
          if (e.key === "ArrowUp" && !e.shiftKey && !e.ctrlKey) {
            if (this.replHistoryIndex > 0) {
              this.replHistoryIndex--;
              input.value = this.replHistory[this.replHistoryIndex];
              e.preventDefault();
              // Move cursor to end
              setTimeout(() => {
                input.selectionStart = input.selectionEnd = input.value.length;
              }, 0);
            }
          }
          
          if (e.key === "ArrowDown" && !e.shiftKey && !e.ctrlKey) {
            if (this.replHistoryIndex < this.replHistory.length - 1) {
              this.replHistoryIndex++;
              input.value = this.replHistory[this.replHistoryIndex];
              e.preventDefault();
            } else if (this.replHistoryIndex === this.replHistory.length - 1) {
              this.replHistoryIndex++;
              input.value = "";
              e.preventDefault();
            }
          }
        });
        
        return container;
      }
      
      loadREPLTranscript() {
        const entries = JSON.parse(localStorage.getItem("repl-transcript") || "[]");
        const container = document.getElementById("repl-transcript-entries");
        
        if (!container) return;
        
        container.innerHTML = "";
        
        // Show last 10 entries
        const recent = entries.slice(-10);
        for (const entry of recent) {
          this.addTranscriptEntry(entry.code, entry.result, entry.error, false);
        }
        
        if (entries.length === 0) {
          const empty = document.createElement("div");
          empty.style.color = "#999";
          empty.style.fontStyle = "italic";
          empty.style.padding = "20px";
          empty.textContent = "No commands run yet. Try: await api.getAll()";
          container.appendChild(empty);
        }
      }
      
      addTranscriptEntry(code, result, error, save = true) {
        const container = document.getElementById("repl-transcript-entries");
        
        const entry = document.createElement("div");
        entry.className = "repl-entry" + (error ? " error" : " success");
        
        const codeDiv = document.createElement("div");
        codeDiv.className = "repl-entry-code";
        codeDiv.textContent = "> " + code;
        entry.appendChild(codeDiv);
        
        const outputDiv = document.createElement("div");
        outputDiv.className = error ? "repl-entry-error" : "repl-entry-output";
        outputDiv.textContent = error || result;
        entry.appendChild(outputDiv);
        
        container.appendChild(entry);
        
        // Save to localStorage
        if (save) {
          const transcript = JSON.parse(localStorage.getItem("repl-transcript") || "[]");
          transcript.push({ code, result, error, timestamp: Date.now() });
          
          // Keep last 50 entries
          if (transcript.length > 50) {
            transcript.shift();
          }
          
          localStorage.setItem("repl-transcript", JSON.stringify(transcript));
        }
        
        // Scroll to bottom
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      
      async runREPL() {
        const input = document.getElementById("repl-input");
        const code = input.value.trim();
        
        if (!code) return;
        
        // Add to history
        if (this.replHistory.length === 0 || this.replHistory[this.replHistory.length - 1] !== code) {
          this.replHistory.push(code);
          
          // Keep last 50 commands
          if (this.replHistory.length > 50) {
            this.replHistory.shift();
          }
          
          localStorage.setItem("repl-history", JSON.stringify(this.replHistory));
        }
        this.replHistoryIndex = this.replHistory.length;
        
        const api = this.createREPLAPI();
        
        try {
          // Wrap in async function to allow await
          const asyncFn = new Function("api", `
            return (async () => {
              ${code}
            })();
          `);
          
          const result = await asyncFn(api);
          
          let resultStr;
          if (result === undefined) {
            resultStr = "// Executed successfully (no return value)";
          } else if (typeof result === 'string' && result.includes('\n')) {
            // Multi-line strings (like help output) - display directly
            resultStr = result;
          } else {
            // Everything else - JSON format
            resultStr = JSON.stringify(result, null, 2);
          }
          
          this.addTranscriptEntry(code, resultStr, null);
          
          // Clear input on successful execution
          input.value = "";
          
        } catch (error) {
          const errorStr = `Error: ${error.message}\n${error.stack}`;
          this.addTranscriptEntry(code, null, errorStr);
        }
      }
      
      createREPLAPI() {
        const kernel = this;
        
        return {
          // Storage operations
          get: (id) => kernel.storage.get(id),
          set: async (item) => {
            // Save without triggering re-render
            item.modified = Date.now();
            await kernel.storage.set(item, kernel);
            return item.id;
          },
          update: async (item) => {
            // Save and trigger re-render if there's a current root
            item.modified = Date.now();
            await kernel.storage.set(item, kernel);
            if (kernel.currentRoot) {
              await kernel.renderRoot(kernel.currentRoot);
            }
            return item.id;
          },
          delete: (id) => kernel.deleteItem(id),
          query: (filter) => kernel.storage.query(filter),
          getAll: () => kernel.storage.getAll(),

          // Code operations
          require: (name) => kernel.require(name),

          // Navigation
          navigate: (id) => kernel.navigateToItem(id),
          
          // Export
          export: async () => {
            const items = await kernel.storage.getAll();
            const json = JSON.stringify(items, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `backup-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            return items.length;
          },
          
          // Import
          import: async (json) => {
            const items = JSON.parse(json);
            let created = 0, skipped = 0;
            
            for (const item of items) {
              const exists = await kernel.storage.exists(item.id);
              if (!exists) {
                await kernel._rawSet(item);
                created++;
              } else {
                skipped++;
              }
            }
            
            return { created, skipped };
          },
          
          // Reset
          reset: async () => {
            if (!confirm("This will delete ALL data. Are you sure?")) {
              return { cancelled: true };
            }
            
            const items = await kernel.storage.getAll();
            for (const item of items) {
              await kernel.storage.delete(item.id);
            }
            
            await kernel.ensureSeedItems();
            window.location.reload();
          },
          
          // Utilities
          uuid: () => crypto.randomUUID(),
          now: () => Date.now(),
          
          // Helper functions for common tasks
          helpers: {
            // Create a new type definition
            createType: async (name, description) => {
              const id = crypto.randomUUID();
              await kernel.storage.set({
                id,
                name,
                type: IDS.TYPE_DEFINITION,
                created: Date.now(),
                modified: Date.now(),
                children: [],
                content: { description }
              }, kernel);
              return id;
            },
            
            // Create a new renderer
            createRenderer: async (name, forType, code) => {
              const id = crypto.randomUUID();
              await kernel.storage.set({
                id,
                name,
                type: IDS.RENDERER,
                created: Date.now(),
                modified: Date.now(),
                children: [],
                content: { for_type: forType, code }
              }, kernel);
              return id;
            },
            
            // Create a new library
            createLibrary: async (name, code) => {
              const id = crypto.randomUUID();
              await kernel.storage.set({
                id,
                name,
                type: IDS.LIBRARY,
                created: Date.now(),
                modified: Date.now(),
                children: [],
                content: { code }
              }, kernel);
              return id;
            },
            
            // Duplicate an item with a new ID
            duplicateItem: async (id, newName) => {
              const original = await kernel.storage.get(id);
              const duplicate = {
                ...original,
                id: crypto.randomUUID(),
                name: newName || (original.name ? original.name + "_copy" : undefined),
                created: Date.now(),
                modified: Date.now()
              };
              await kernel.storage.set(duplicate, kernel);
              return duplicate.id;
            },
            
            // Find item by name
            findByName: async (name) => {
              const items = await kernel.storage.query({ name });
              return items.length > 0 ? items[0] : null;
            },
            
            // List items by type
            listByType: async (typeId) => {
              return await kernel.storage.query({ type: typeId });
            },
            
            // List all types
            listTypes: async () => {
              return await kernel.storage.query({ type: IDS.TYPE_DEFINITION });
            },
            
            // List all renderers
            listRenderers: async () => {
              return await kernel.storage.query({ type: IDS.RENDERER });
            },
            
            // List all code items
            listCode: async () => {
              const all = await kernel.storage.getAll();
              const codeItems = [];
              for (const item of all) {
                if (await kernel.isCodeItem(item)) {
                  codeItems.push(item);
                }
              }
              return codeItems;
            },
            
            // View deleted items
            viewDeleted: () => {
              const deleted = JSON.parse(localStorage.getItem('hobson-deleted-items') || '[]');
              console.log(`Found ${deleted.length} deleted items:`);
              deleted.forEach((entry, i) => {
                console.log(`[${i}] ${entry.item.name || entry.item.id} - deleted ${entry.deletedAtReadable}`);
              });
              return deleted;
            },
            
            // Recover a deleted item by index
            recoverDeleted: async (index) => {
              const deleted = JSON.parse(localStorage.getItem('hobson-deleted-items') || '[]');
              
              if (index < 0 || index >= deleted.length) {
                throw new Error(`Index ${index} out of range (0-${deleted.length - 1})`);
              }
              
              const entry = deleted[index];
              const item = entry.item;
              
              // Restore the item
              await kernel.storage.set(item, kernel);
              
              // Remove from deletion log
              deleted.splice(index, 1);
              localStorage.setItem('hobson-deleted-items', JSON.stringify(deleted));
              
              console.log(`Recovered: ${item.name || item.id}`);
              return item.id;
            },
            
            // Clear deletion log
            clearDeleted: () => {
              const deleted = JSON.parse(localStorage.getItem('hobson-deleted-items') || '[]');
              const count = deleted.length;
              localStorage.removeItem('hobson-deleted-items');
              console.log(`Cleared ${count} items from deletion log`);
              return count;
            }
          },
          
          // Help system
          help: (method) => {
            if (!method) {
              // Show all available methods
              return `Available REPL API methods:

STORAGE:
  get(id)              - Get item by ID
  set(item)            - Create or update item
  delete(id)           - Delete item
  query(filter)        - Find items matching filter
  getAll()             - Get all items

CODE:
  require(nameOrId)    - Load code module by name or ID

NAVIGATION:
  navigate(id)         - Navigate to item

DATA MANAGEMENT:
  export()             - Download all data as JSON
  import(json)         - Import items from JSON
  reset()              - Delete all data (dangerous!)

UTILITIES:
  uuid()               - Generate new UUID
  now()                - Current timestamp

HELPERS:
  helpers.createType(name, description)
  helpers.createRenderer(name, forType, code)
  helpers.createLibrary(name, code)
  helpers.duplicateItem(id, newName)
  helpers.findByName(name)
  helpers.listByType(typeId)
  helpers.listTypes()
  helpers.listRenderers()
  helpers.listCode()
  helpers.viewDeleted()
  helpers.recoverDeleted(index)
  helpers.clearDeleted()

VIEWPORT:
  viewport.select(id)       - Select an item
  viewport.clearSelection() - Clear selection
  viewport.getSelection()   - Get selected item ID
  viewport.getRoot()        - Get current root item ID
  viewport.getRootRenderer() - Get renderer override for root
  viewport.setRootRenderer(id) - Set renderer override for root

CONSTANTS:
  IDS.ATOM, IDS.TYPE_DEFINITION, IDS.CODE, IDS.RENDERER,
  IDS.LIBRARY, IDS.DEFAULT_RENDERER, IDS.WORKSPACE,
  IDS.CONTAINER, IDS.CONTAINER_RENDERER, IDS.VIEWPORT

Type api.help('methodName') for details on a specific method.`;
            }
            
            // Method-specific help
            const helpText = {
              get: `get(id: string) -> Promise<Item>

Retrieve a single item by its ID.

Example:
  const item = await api.get('00000000-0000-0000-0000-000000000006')
  console.log(item.name) // "workspace"`,

              set: `set(item: Item) -> Promise<string>

Create or update an item. Returns the item's ID.
Automatically updates the modified timestamp.

Example:
  await api.set({
    id: crypto.randomUUID(),
    name: 'my_note',
    type: api.IDS.ATOM,
    created: Date.now(),
    modified: Date.now(),
    children: [],
    content: { text: 'Hello world' }
  })`,

              delete: `delete(id: string) -> Promise<void>

Delete an item entirely. Also removes it from all parent containers.

Example:
  await api.delete('some-item-id')`,

              query: `query(filter: object) -> Promise<Item[]>

Find items matching filter criteria. Only matches top-level fields.

Example:
  const types = await api.query({ type: api.IDS.TYPE_DEFINITION })
  const recent = await api.query({ created: Date.now() - 86400000 })`,

              getAll: `getAll() -> Promise<Item[]>

Retrieve all items in the database.

Example:
  const all = await api.getAll()
  console.log(\`System has \${all.length} items\`)`,

              require: `require(nameOrId: string) -> Promise<Module>

Load a code module by name or ID. Caches modules for performance.

Example:
  const lib = await api.require('my_library')
  lib.someFunction()`,

              navigate: `navigate(id: string) -> Promise<void>

Navigate to a different item (changes URL and re-renders).

Example:
  await api.navigate(api.IDS.WORKSPACE)`,

              export: `export() -> Promise<number>

Download all items as JSON file. Returns number of items exported.

Example:
  const count = await api.export()
  console.log(\`Exported \${count} items\`)`,

              import: `import(json: string) -> Promise<object>

Import items from JSON. Skips items with duplicate IDs.
Returns {created, skipped}.

Example:
  const result = await api.import(jsonString)
  console.log(\`Created \${result.created}, skipped \${result.skipped}\`)`,

              reset: `reset() -> Promise<object>

Delete ALL data and recreate seed items. Shows confirmation dialog.
Returns {cancelled: true} if user cancels.

Example:
  await api.reset()`,

              uuid: `uuid() -> string

Generate a new UUID.

Example:
  const id = api.uuid()`,

              now: `now() -> number

Get current timestamp in milliseconds.

Example:
  const timestamp = api.now()`,

              helpers: `Helpers are utility functions for common tasks:

  createType(name, description)        - Create type definition
  createRenderer(name, forType, code)  - Create renderer for type
  createLibrary(name, code)            - Create reusable library
  duplicateItem(id, newName)           - Clone an item
  findByName(name)                     - Find item by name
  listByType(typeId)                   - Find all items of type
  listTypes()                          - List all type definitions
  listRenderers()                      - List all renderers
  listCode()                           - List all code items
  viewDeleted()                        - Show deleted items audit
  recoverDeleted(index)                - Restore deleted item
  clearDeleted()                       - Clear deletion audit

Type api.help('helpers.createType') for specific helper details.`,

              'helpers.createType': `helpers.createType(name: string, description: string) -> Promise<string>

Create a new type definition. Returns the new type's ID.

Example:
  const noteType = await api.helpers.createType('note', 'A simple note')`,

              'helpers.createRenderer': `helpers.createRenderer(name: string, forType: string, code: string) -> Promise<string>

Create a renderer for a type. Returns the renderer's ID.

Example:
  await api.helpers.createRenderer(
    'note_renderer',
    noteTypeId,
    \`export function render(item, api) {
      return api.createElement('div', {}, [item.content.description]);
    }\`
  )`,

              'helpers.createLibrary': `helpers.createLibrary(name: string, code: string) -> Promise<string>

Create a reusable code library. Returns the library's ID.

Example:
  await api.helpers.createLibrary(
    'utils',
    \`export function formatDate(ts) { return new Date(ts).toLocaleDateString(); }\`
  )`,

              'helpers.duplicateItem': `helpers.duplicateItem(id: string, newName?: string) -> Promise<string>

Clone an item with a new ID. Returns the new item's ID.

Example:
  const cloneId = await api.helpers.duplicateItem(originalId, 'Copy of Original')`,

              'helpers.findByName': `helpers.findByName(name: string) -> Promise<Item | null>

Find an item by name. Returns null if not found.

Example:
  const workspace = await api.helpers.findByName('workspace')`,

              'helpers.listByType': `helpers.listByType(typeId: string) -> Promise<Item[]>

Find all items of a specific type.

Example:
  const notes = await api.helpers.listByType(noteTypeId)`,

              'helpers.listTypes': `helpers.listTypes() -> Promise<Item[]>

List all type definitions in the system.

Example:
  const types = await api.helpers.listTypes()`,

              'helpers.listRenderers': `helpers.listRenderers() -> Promise<Item[]>

List all renderer items in the system.

Example:
  const renderers = await api.helpers.listRenderers()`,

              'helpers.listCode': `helpers.listCode() -> Promise<Item[]>

List all code items (renderers, libraries, etc).

Example:
  const code = await api.helpers.listCode()`,

              IDS: `IDS - Well-known item IDs

Constants for seed items:
  IDS.ATOM              - Base type (00000000-...-000000)
  IDS.TYPE_DEFINITION   - Type definition type
  IDS.CODE              - Code item type
  IDS.RENDERER          - Renderer type
  IDS.LIBRARY           - Library type
  IDS.DEFAULT_RENDERER  - Fallback JSON renderer
  IDS.WORKSPACE         - Default root container
  IDS.CONTAINER         - Container type
  IDS.CONTAINER_RENDERER - Container renderer
  IDS.VIEWPORT          - System viewport container

Example:
  await api.navigate(api.IDS.WORKSPACE)`
            };
            
            return helpText[method] || `No help available for '${method}'.\nTry api.help() to see all methods.`;
          },

          // UI operations
          editRaw: (itemId) => kernel.editItemRaw(itemId),
          getRecentItems: () => kernel.getRecentItems(),

          // For script execution - returns REPL API for code evaluation
          createREPLContext: () => kernel.createREPLAPI(),

          // Well-known IDs
          IDS,

          // Viewport API for view state management
          viewport: {
            select: (itemId) => kernel.viewport.select(itemId),
            clearSelection: () => kernel.viewport.clearSelection(),
            getSelection: () => kernel.viewport.getSelection(),
            getRoot: () => kernel.viewport.rootId,
            getRootRenderer: () => kernel.viewport.getRootRenderer(),
            setRootRenderer: async (rendererId) => {
              kernel.viewport.setRootRenderer(rendererId);
              await kernel.viewport.persist();
            }
          }
        };
      }

      // -------------------------------------------------------------------------
      // Safe Mode
      // -------------------------------------------------------------------------
      
      renderSafeMode() {
        document.body.innerHTML = `
          <div id="safe-mode">
            <h1>(!) Safe Mode</h1>
            <p>Booted with minimal kernel only. No user code items loaded.</p>
            <p>Use this mode to fix broken code items.</p>
            <p style="color: #666; font-size: 12px;">Access safe mode anytime by adding <code>?safe=1</code> to the URL.</p>
            
            <div class="actions">
              <button onclick="kernel.safeListAllItems()">View All Items</button>
              <button onclick="kernel.safeListCodeItems()">View Code Items Only</button>
              <button onclick="kernel.safeExport()">Export All Data</button>
              <button onclick="kernel.safeImport()">Import Data</button>
              <button onclick="kernel.safeReset()">Reset System (Dangerous!)</button>
              <button onclick="window.location.href = window.location.pathname">Exit Safe Mode</button>
            </div>
            
            <div id="item-list" class="item-list"></div>
          </div>
        `;
      }
      
      async safeListAllItems() {
        const items = await this.storage.getAll();
        this._renderSafeItemList(items, "All Items");
      }
      
      async safeListCodeItems() {
        const items = await this.storage.getAll();
        const codeItems = [];
        
        for (const item of items) {
          if (await this.isCodeItem(item)) {
            codeItems.push(item);
          }
        }
        
        this._renderSafeItemList(codeItems, "Code Items");
      }
      
      _renderSafeItemList(items, title) {
        const listEl = document.getElementById("item-list");
        listEl.innerHTML = `<h2>${title} (${items.length})</h2>`;
        
        for (const item of items) {
          const preview = document.createElement("div");
          preview.className = "item-preview";
          preview.innerHTML = `
            <div class="item-info">
              <div class="item-name">${item.name || item.id}</div>
              <div class="item-type">Type: ${item.type}</div>
            </div>
            <div>
              <button onclick="kernel.safeEditItem('${item.id}')">Edit as JSON</button>
              <button onclick="kernel.safeDeleteItem('${item.id}')" style="color: red;">Delete</button>
            </div>
          `;
          listEl.appendChild(preview);
        }
      }
      
      async safeEditItem(itemId) {
        const item = await this.storage.get(itemId);
        const json = JSON.stringify(item, null, 2);
        
        document.body.innerHTML = `
          <div class="raw-editor">
            <h2>Editing: ${item.name || item.id}</h2>
            <textarea id="raw-json" rows="30">${this._escapeHtml(json)}</textarea>
            <div class="actions">
              <button onclick="kernel.safeSaveItem('${itemId}')">Save</button>
              <button onclick="kernel.renderSafeMode()">Cancel</button>
            </div>
          </div>
        `;
      }
      
      async safeSaveItem(itemId) {
        const textarea = document.getElementById("raw-json");
        try {
          const updated = JSON.parse(textarea.value);
          updated.modified = Date.now();
          await this._rawSet(updated);
          this.moduleCache.delete(updated.id);
          alert("Saved successfully");
          this.renderSafeMode();
        } catch (error) {
          alert(`Error: ${error.message}`);
        }
      }
      
      async safeDeleteItem(itemId) {
        if (!confirm(`Delete item ${itemId}? This cannot be undone.`)) {
          return;
        }
        
        await this.storage.delete(itemId);
        this.safeListAllItems();
      }
      
      async safeExport() {
        const items = await this.storage.getAll();
        const json = JSON.stringify(items, null, 2);
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `safe-mode-backup-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert(`Exported ${items.length} items`);
      }
      
      // In Kernel class
      safeImport() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';

        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          try {
            const text = await file.text();
            const items = JSON.parse(text);

            if (!Array.isArray(items)) {
              throw new Error('JSON must be an array of items');
            }

            let created = 0, skipped = 0;

            for (const item of items) {
              const exists = await this.storage.exists(item.id);
              if (!exists) {
                await this._rawSet(item);
                created++;
              } else {
                skipped++;
              }
            }

            // Clear module cache
            this.moduleCache.clear();

            alert(`Import complete!\nCreated: ${created}\nSkipped: ${skipped}`);
            this.renderSafeMode();

          } catch (error) {
            alert(`Import failed: ${error.message}`);
          }
        };

        input.click();
      }

      async safeReset() {
        if (!confirm("WARNING: This will delete ALL your data!\n\nOnly the seed items will remain.\n\nHave you exported your data? This cannot be undone!")) {
          return;
        }
        
        const items = await this.storage.getAll();
        for (const item of items) {
          await this.storage.delete(item.id);
        }
        
        await this.ensureSeedItems();
        this.renderSafeMode();
        alert("System reset complete");
      }
      
      _escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    }

    // =============================================================================
    // INITIALIZATION
    // =============================================================================
    
    // Create kernel and expose globally for safe mode buttons
    const kernel = new Kernel();
    window.kernel = kernel;
    
    // Boot immediately
    kernel.boot().catch(error => {
      console.error("Boot failed:", error);
      document.getElementById("main-view").innerHTML = `
        <div class="render-error">
          <h3>Boot Failed</h3>
          <pre>${error.message}</pre>
          <pre>${error.stack}</pre>
        </div>
      `;
    });
  </script>
